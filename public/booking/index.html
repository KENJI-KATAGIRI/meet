<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約システム</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:#1e1e3a;padding:40px;border-radius:16px;width:100%;max-width:420px;border:1px solid #2a2a4a}
h1{font-size:26px;margin-bottom:8px;text-align:center}
.subtitle{color:#888;font-size:14px;margin-bottom:28px;text-align:center}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;background:#fff;border:none;border-radius:8px;color:#333;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s}
.btn-google:hover{background:#f0f0f0}
.btn-google svg{flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#2a2a4a}
.divider span{color:#555;font-size:12px}
input{width:100%;padding:12px 14px;background:#2a2a4a;border:1px solid #3a3a5a;border-radius:8px;color:#fff;font-size:14px;margin-bottom:10px;outline:none;transition:border .2s}
input:focus{border-color:#6c63ff}
input::placeholder{color:#555}
.btn-primary{width:100%;padding:13px;background:#6c63ff;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-primary:hover{background:#5a52e0}
.toggle{text-align:center;margin-top:16px;font-size:13px;color:#666}
.toggle a{color:#6c63ff;cursor:pointer;text-decoration:none}
.toggle a:hover{text-decoration:underline}
.error{color:#ff6b6b;font-size:13px;margin-top:10px;text-align:center;min-height:18px}
.form-section{display:none}
.form-section.active{display:block}
</style>
</head>
<body>
<div class="box">
  <h1>予約システム</h1>
  <p class="subtitle">ログインして予約ページを設定しましょう</p>

  <a href="/auth/google" class="btn-google">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Googleでログイン
  </a>

  <div class="divider"><span>または</span></div>

  <!-- ログインフォーム -->
  <div class="form-section active" id="form-login">
    <input type="email" id="login-email" placeholder="メールアドレス" autocomplete="email">
    <input type="password" id="login-pass" placeholder="パスワード" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">ログイン</button>
    <div class="toggle">アカウントをお持ちでない方は<a onclick="switchForm('register')">新規登録</a></div>
  </div>

  <!-- 新規登録フォーム -->
  <div class="form-section" id="form-register">
    <input type="text" id="reg-name" placeholder="お名前" autocomplete="name">
    <input type="email" id="reg-email" placeholder="メールアドレス" autocomplete="email">
    <input type="password" id="reg-pass" placeholder="パスワード（8文字以上）" autocomplete="new-password">
    <button class="btn-primary" onclick="doRegister()">登録する</button>
    <div class="toggle">すでにアカウントをお持ちの方は<a onclick="switchForm('login')">ログイン</a></div>
  </div>

  <div class="error" id="err"></div>
</div>
<script>
if (new URLSearchParams(location.search).get('error')) {
  document.getElementById('err').textContent = 'ログインに失敗しました。もう一度お試しください。';
}
function switchForm(mode) {
  document.getElementById('form-login').classList.toggle('active', mode === 'login');
  document.getElementById('form-register').classList.toggle('active', mode === 'register');
  document.getElementById('err').textContent = '';
}
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pass').value;
  const err = document.getElementById('err');
  err.textContent = '';
  const r = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email, password }) });
  const d = await r.json();
  if (d.error) { err.textContent = d.error; return; }
  location.href = '/booking/dashboard';
}
async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pass').value;
  const err = document.getElementById('err');
  err.textContent = '';
  const r = await fetch('/auth/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, email, password }) });
  const d = await r.json();
  if (d.error) { err.textContent = d.error; return; }
  location.href = '/booking/dashboard';
}
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('form-login').classList.contains('active')) doLogin();
  else doRegister();
});
</script>
</body>
</html>
