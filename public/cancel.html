<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NiceMeet - 予約キャンセル</title>
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#2a2a4a;--accent:#6c63ff;--text:#fff;--muted:#888;--border:#2a2a4a;--danger:#e94560}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--bg2);border-radius:16px;padding:36px 28px;max-width:460px;width:100%;border:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-name{font-size:17px;font-weight:700}
h1{font-size:20px;font-weight:800;margin-bottom:8px}
.sub{color:var(--muted);font-size:14px;margin-bottom:24px;line-height:1.6}
.detail-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.detail-row{display:flex;gap:12px;background:var(--bg3);border-radius:10px;padding:13px 14px;align-items:center}
.detail-row .ico{font-size:16px;flex-shrink:0}
.detail-row .lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
.detail-row .val{font-size:14px;font-weight:700}
.btn-cancel{width:100%;padding:14px;background:var(--danger);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s}
.btn-cancel:hover:not(:disabled){background:#c73652;transform:translateY(-1px)}
.btn-cancel:disabled{opacity:.5;cursor:not-allowed}
.btn-back{display:block;text-align:center;margin-top:14px;color:var(--muted);font-size:13px;text-decoration:none;cursor:pointer}
.btn-back:hover{color:var(--text)}
.done-icon{width:68px;height:68px;background:linear-gradient(135deg,#1a0a0a,#2a1010);border:2px solid var(--danger);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px}
.loading{text-align:center;color:var(--muted);padding:40px}
.err{background:#2a0a0a;border:1px solid #7a2a2a;border-radius:10px;padding:16px;color:#f87171;font-size:14px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📅</div>
    <span class="logo-name">NiceMeet</span>
  </div>
  <div id="content"><div class="loading">読み込み中...</div></div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');

async function load() {
  if (!token) { showError('無効なリンクです。'); return; }
  const r = await fetch('/api/cancel-info?token=' + encodeURIComponent(token));
  const info = await r.json();
  if (!info.found) { showError('この予約は見つかりません。すでにキャンセル済みか、無効なリンクです。'); return; }
  if (info.cancelled) { showDone('この予約はすでにキャンセルされています。'); return; }
  const d = new Date(info.start_time);
  const fd = d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const ft = d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  const fe = new Date(info.end_time).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('content').innerHTML = `
    <h1>予約のキャンセル</h1>
    <p class="sub">以下の予約をキャンセルしますか？<br>キャンセル後は元に戻せません。</p>
    <div class="detail-list">
      <div class="detail-row"><div class="ico">📅</div><div><div class="lbl">日時</div><div class="val">${fd} ${ft} 〜 ${fe}</div></div></div>
      <div class="detail-row"><div class="ico">👤</div><div><div class="lbl">ホスト</div><div class="val">${escHtml(info.host_name)} さん</div></div></div>
      <div class="detail-row"><div class="ico">🙋</div><div><div class="lbl">予約者</div><div class="val">${escHtml(info.booker_name)}</div></div></div>
    </div>
    <button class="btn-cancel" id="btn" onclick="doCancel()">この予約をキャンセルする</button>
    <a class="btn-back" id="back-link" href="/b/${info.slug}">← 予約ページに戻る</a>
  `;
}

async function doCancel() {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '処理中...';
  const r = await fetch('/api/cancel', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token }) });
  const d = await r.json();
  if (d.ok) {
    showDone('予約がキャンセルされました。ホストにも通知しました。');
  } else {
    btn.disabled = false; btn.textContent = 'この予約をキャンセルする';
    showError(d.error || 'キャンセルに失敗しました。');
  }
}

function showDone(msg) {
  document.getElementById('content').innerHTML = `
    <div class="done-icon">✓</div>
    <h1 style="text-align:center;margin-bottom:10px">キャンセル完了</h1>
    <p class="sub" style="text-align:center">${msg}</p>
  `;
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="err">${msg}</div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
