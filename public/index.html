<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NiceMeet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;height:100vh;height:100dvh;overflow:hidden}
#lobby{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;background:linear-gradient(135deg,#0f0f1a,#1a1a3e)}
.lobby-box{background:#1e1e3a;padding:40px;border-radius:16px;width:min(420px,calc(100vw - 32px));box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lobby-box h1{font-size:28px;margin-bottom:8px;text-align:center}
.lobby-box p{color:#888;text-align:center;margin-bottom:32px;font-size:14px}
.lobby-box input{width:100%;padding:12px 16px;background:#2a2a4a;border:1px solid #3a3a5a;border-radius:8px;color:#fff;font-size:15px;margin-bottom:12px;outline:none;transition:border .2s}
.lobby-box input:focus{border-color:#6c63ff}
.lobby-box input::placeholder{color:#555}
.btn-primary{width:100%;padding:14px;background:#6c63ff;border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px}
.btn-primary:hover{background:#5a52e0}
.error-msg{color:#ff6b6b;font-size:13px;text-align:center;margin-top:8px;min-height:20px}
.time-banner{border-radius:10px;padding:13px 16px;margin-bottom:18px;font-size:13px;line-height:1.6;display:none}
.time-banner.on-time{background:#0d2a18;border:1px solid #2d7a4a;color:#4ade80}
.time-banner.too-early{background:#2a2200;border:1px solid #7a5a00;color:#fbbf24}
.time-banner.too-late{background:#2a0a0a;border:1px solid #7a2a2a;color:#f87171}
.time-banner .tb-title{font-weight:700;margin-bottom:3px}
.optional-label{font-size:12px;color:#666;margin-bottom:4px;display:block}
#meeting{display:none;flex-direction:row;height:100vh}
#top-bar{background:#16162a;padding:0 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2a2a4a;flex-shrink:0;height:44px}
#top-bar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
#top-bar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
#top-room-name{font-size:13px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#elapsed-time{font-size:12px;color:#6c63ff;font-family:monospace;background:#1a1a3e;padding:2px 8px;border-radius:4px;flex-shrink:0}
.layout-btn{background:#2a2a4a;border:1px solid transparent;border-radius:6px;color:#888;padding:4px 8px;cursor:pointer;font-size:16px;transition:all .2s;line-height:1}
.layout-btn:hover{border-color:#3a3a5a;color:#ccc}
.layout-btn.active{border-color:#6c63ff;color:#6c63ff;background:#1e1e4a}
.top-btn{background:#2a2a4a;border:1px solid transparent;border-radius:6px;color:#888;padding:4px 9px;cursor:pointer;font-size:16px;transition:all .2s;line-height:1}
.top-btn:hover{border-color:#3a3a5a;color:#ccc}
#video-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#thumb-strip{height:110px;display:none;gap:4px;padding:4px 8px;background:#06060f;overflow-x:auto;flex-shrink:0;border-top:1px solid #1a1a2e;align-items:center}
#thumb-strip .video-tile{width:176px;height:100%;flex-shrink:0;aspect-ratio:unset;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border .2s}
#thumb-strip .video-tile:hover{border-color:#6c63ff}
#thumb-strip .video-tile .name-tag{font-size:10px;padding:2px 6px}
.video-tile.speaking-indicator{box-shadow:0 0 0 2px #4ade80}
#videos{flex:1;display:grid;gap:4px;padding:4px;background:#0a0a12;overflow:hidden;align-content:center}
.video-tile{position:relative;background:#1a1a2e;border-radius:8px;overflow:hidden;aspect-ratio:16/9}
.video-tile video{width:100%;height:100%;object-fit:cover}
#tile-local video{transform:scaleX(-1)}
.video-tile .name-tag{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.6);padding:3px 10px;border-radius:20px;font-size:13px;font-weight:500}
.video-tile .muted-icon{position:absolute;top:8px;right:8px;background:rgba(220,50,50,.8);width:28px;height:28px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:13px}
.video-tile.muted .muted-icon{display:flex}
.avatar-placeholder{width:100%;height:100%;display:none;align-items:center;justify-content:center;background:#1e1e3e;font-size:48px}
.video-tile.no-video .avatar-placeholder{display:flex}
.video-tile.no-video video{display:none}
.video-tile.screen-tile{aspect-ratio:unset;min-height:180px}
.video-tile.screen-tile video{object-fit:contain;background:#000}
#controls{background:#16162a;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;border-top:1px solid #2a2a4a;flex-wrap:wrap}
.ctrl-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;color:#ccc;padding:6px 10px;border-radius:8px;transition:all .2s;font-size:10px;min-width:54px}
.ctrl-btn .icon{width:42px;height:42px;border-radius:50%;background:#2a2a4a;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
.ctrl-btn:hover .icon{background:#3a3a5a}
.ctrl-btn.active .icon{background:#e94560}
.ctrl-btn.leave .icon{background:#e94560}
.ctrl-btn.leave:hover .icon{background:#c73652}
.room-info{color:#666;font-size:12px;margin-right:auto;padding-left:12px}
#participant-count{color:#aaa;font-size:13px;margin-left:auto;padding-right:12px}

/* チャット */
#meeting-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#chat-panel{width:0;overflow:hidden;background:#1e1e3a;border-left:1px solid #2a2a4a;display:flex;flex-direction:column;transition:width .3s;flex-shrink:0}
#chat-panel.open{width:320px}
#chat-panel>*{min-width:320px}
#chat-header{padding:16px;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between;font-weight:600}
#chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.chat-msg{background:#2a2a4a;padding:10px 12px;border-radius:8px;font-size:13px}
.chat-msg .sender{font-weight:600;color:#6c63ff;margin-bottom:3px;font-size:12px}
.chat-msg .time{color:#555;font-size:11px;float:right;margin-top:-16px}
.chat-msg.self{background:#2d2d5a}
#chat-input-row{padding:12px;border-top:1px solid #2a2a4a;display:flex;gap:8px}
#chat-input{flex:1;padding:10px;background:#2a2a4a;border:1px solid #3a3a5a;border-radius:8px;color:#fff;font-size:14px;outline:none}
#chat-input:focus{border-color:#6c63ff}
#chat-send{padding:10px 16px;background:#6c63ff;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:16px}
#close-chat{background:none;border:none;color:#888;font-size:20px;cursor:pointer}
#chat-attach{padding:8px 12px;background:#2a2a4a;border:1px solid #3a3a5a;border-radius:8px;color:#888;cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0}
#chat-attach:hover{color:#6c63ff;border-color:#6c63ff}
.chat-img{max-width:100%;border-radius:6px;margin-top:4px;display:block;cursor:pointer}
.chat-file-link{color:#4ade80;font-weight:600;text-decoration:none;display:inline-block;margin-top:4px}
.chat-file-link:hover{text-decoration:underline}

/* エフェクトパネル */
#effects-panel{position:fixed;left:-300px;top:0;width:300px;height:100vh;background:#1e1e3a;border-right:1px solid #2a2a4a;display:flex;flex-direction:column;transition:left .3s;z-index:100;overflow-y:auto}
#effects-panel.open{left:0}
#effects-header{padding:16px;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between;font-weight:600}
.effects-section{padding:16px;border-bottom:1px solid #2a2a4a}
.effects-section h3{font-size:13px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.effect-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.effect-opt{background:#2a2a4a;border:2px solid transparent;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;font-size:12px;transition:all .2s;color:#ccc}
.effect-opt:hover{border-color:#3a3a5a;background:#2d2d5a}
.effect-opt.selected{border-color:#6c63ff;background:#2d2d5a;color:#fff}
.effect-opt .eff-icon{font-size:24px;margin-bottom:4px}
.beauty-slider{display:flex;flex-direction:column;gap:8px}
.beauty-level-btns{display:flex;gap:8px}
.beauty-btn{flex:1;padding:8px;background:#2a2a4a;border:2px solid transparent;border-radius:8px;color:#ccc;font-size:12px;cursor:pointer;text-align:center;transition:all .2s}
.beauty-btn:hover{border-color:#3a3a5a}
.beauty-btn.selected{border-color:#6c63ff;color:#fff;background:#2d2d5a}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.color-swatch{width:32px;height:32px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border .2s}
.color-swatch:hover,.color-swatch.selected{border-color:#fff}
.upload-btn{width:100%;padding:10px;background:#2a2a4a;border:1px dashed #3a3a5a;border-radius:8px;color:#888;font-size:13px;cursor:pointer;text-align:center;margin-top:8px;transition:all .2s}
.upload-btn:hover{border-color:#6c63ff;color:#6c63ff}
.loading-model{font-size:12px;color:#6c63ff;text-align:center;padding:8px;display:none}
#close-effects{background:none;border:none;color:#888;font-size:20px;cursor:pointer}
.zoom-row{display:flex;align-items:center;gap:10px;margin-top:4px}
.zoom-row input[type=range]{flex:1;accent-color:#6c63ff;height:4px}
.zoom-row span{font-size:12px;color:#6c63ff;min-width:32px;text-align:right}

/* 通知 */
#notification{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2a2a4a;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
#notification.show{opacity:1}

/* スマホ用 */
#btn-flip{display:none}
#bg-history-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.bg-thumb{width:48px;height:48px;border-radius:6px;cursor:pointer;border:2px solid transparent;background-size:cover;background-position:center;flex-shrink:0;transition:border-color .2s}.bg-thumb.selected{border-color:#7c6fff}.bg-thumb:hover{border-color:#888}
#btn-more{display:none}
#more-menu{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e1e3a;border:1px solid #3a3a5a;border-radius:12px;padding:8px;z-index:150;box-shadow:0 8px 32px rgba(0,0,0,.7);gap:4px}
#more-menu.open{display:flex}
@media(max-width:640px){
  body,#lobby{height:100dvh}
  .lobby-box{padding:24px 20px}
  #controls{padding:8px 2px;gap:2px}
  .ctrl-btn{min-width:44px;padding:4px 2px;font-size:9px}
  .ctrl-btn .icon{width:44px;height:44px;font-size:20px}
  .ctrl-btn-secondary{display:none}
  #btn-flip,#btn-more{display:flex}
  #chat-panel.open{position:fixed!important;width:100%!important;height:100dvh;top:0;left:0;z-index:200}
  #chat-panel>*{min-width:0!important}
  #effects-panel{width:100%;left:-100%}
  #effects-panel.open{left:0}
}
</style>
</head>
<body>

<div id="lobby">
  <div class="lobby-box">
    <h1>NiceMeet</h1>
    <p>無料のビデオ通話システム</p>
    <input id="input-name" placeholder="お名前" maxlength="20">
    <input id="input-room" placeholder="ルームID（例: office）" maxlength="30">
    <span class="optional-label">パスワード（省略可）</span>
    <input id="input-pass" type="password" placeholder="パスワード">
    <div class="time-banner" id="time-banner"></div>
    <button class="btn-primary" onclick="joinRoom()">参加する</button>
    <div style="border-top:1px solid #2a2a4a;margin-top:20px;padding-top:16px">
      <div style="font-size:11px;color:#555;margin-bottom:10px;letter-spacing:.5px">📝 文字起こし設定</div>
      <span class="optional-label">メールアドレス（省略可）<br><span style="font-size:11px;color:#4a4a6a">会議終了後に要約を送信します</span></span>
      <input id="input-email" type="email" placeholder="example@email.com">
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#777;cursor:pointer;margin-top:-4px;margin-bottom:4px">
        <input type="checkbox" id="input-allow-all" style="accent-color:#6c63ff;width:14px;height:14px;flex-shrink:0;cursor:pointer">
        クライアント側にも文字起こしを許可する
      </label>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<div id="meeting">
<div id="meeting-main">
  <div id="top-bar">
    <div id="top-bar-left">
      <span id="top-room-name"></span>
      <span id="elapsed-time">00:00</span>
    </div>
    <div id="top-bar-right">
      <button class="layout-btn active" id="btn-layout-grid" onclick="setLayout('grid')" title="グリッド">⊞</button>
      <button class="layout-btn" id="btn-layout-speaker" onclick="setLayout('speaker')" title="スピーカービュー">▣</button>
      <button class="top-btn" id="btn-fullscreen" onclick="toggleFullscreen()" title="全画面">⛶</button>
    </div>
  </div>
  <div id="video-area">
    <div id="videos"></div>
    <div id="thumb-strip"></div>
  </div>
  <div id="controls">
    <span class="room-info" id="room-info"></span>
    <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()">
      <div class="icon">🎤</div><span>マイク</span>
    </button>
    <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()">
      <div class="icon">📷</div><span>カメラ</span>
    </button>
    <button class="ctrl-btn" id="btn-flip" onclick="flipCamera()">
      <div class="icon">🔄</div><span>切替</span>
    </button>
    <button class="ctrl-btn ctrl-btn-secondary" id="btn-effects" onclick="toggleEffects()">
      <div class="icon">✨</div><span>エフェクト</span>
    </button>
    <button class="ctrl-btn ctrl-btn-secondary" id="btn-screen" onclick="toggleScreen()">
      <div class="icon">🖥️</div><span>画面共有</span>
    </button>
    <button class="ctrl-btn" id="btn-chat" onclick="toggleChat()">
      <div class="icon">💬</div><span>チャット</span>
    </button>
    <button class="ctrl-btn ctrl-btn-secondary" id="btn-record" onclick="toggleRecording()">
      <div class="icon">⏺️</div><span>録画</span>
    </button>
    <button class="ctrl-btn" id="btn-more" onclick="toggleMore()">
      <div class="icon">⋯</div><span>もっと</span>
    </button>
    <button class="ctrl-btn leave" onclick="leaveRoom()">
      <div class="icon">📴</div><span>退出</span>
    </button>
    <span id="participant-count"></span>
  </div>
</div><!-- /meeting-main -->

<!-- チャットパネル（meeting内に横並び） -->
<div id="chat-panel">
  <div id="chat-header">チャット<button id="close-chat" onclick="toggleChat()">✕</button></div>
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <button id="chat-attach" onclick="document.getElementById('chat-file-input').click()" title="ファイル・画像送信">📎</button>
    <input type="file" id="chat-file-input" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.csv" onchange="sendFile(this)">
    <input id="chat-input" placeholder="メッセージ" onkeydown="if(event.key==='Enter')sendChat()">
    <button id="chat-send" onclick="sendChat()">➤</button>
  </div>
</div>

</div><!-- /meeting -->

<!-- エフェクトパネル -->
<div id="effects-panel">
  <div id="effects-header">
    ✨ エフェクト
    <button id="close-effects" onclick="toggleEffects()">✕</button>
  </div>

  <!-- 美肌フィルター -->
  <div class="effects-section">
    <h3>美肌フィルター <span style="font-size:10px;color:#666;text-transform:none">（シミ・テカり軽減）</span></h3>
    <div class="beauty-level-btns">
      <div class="beauty-btn selected" id="beauty-off" onclick="setBeauty(0)">OFF</div>
      <div class="beauty-btn" id="beauty-light" onclick="setBeauty(1)">ナチュラル</div>
      <div class="beauty-btn" id="beauty-strong" onclick="setBeauty(2)">しっかり</div>
    </div>
  </div>

  <!-- 仮想背景 -->
  <div class="effects-section">
    <h3>仮想背景</h3>
    <div class="loading-model" id="loading-model">モデル読み込み中...</div>
    <div class="effect-options">
      <div class="effect-opt selected" id="bg-none" onclick="setBg('none')">
        <div class="eff-icon">🚫</div>なし
      </div>
      <div class="effect-opt" id="bg-blur" onclick="setBg('blur')">
        <div class="eff-icon">🌫️</div>ぼかし
      </div>
      <div class="effect-opt" id="bg-color" onclick="setBg('color')">
        <div class="eff-icon">🎨</div>カラー
      </div>
      <div class="effect-opt" id="bg-image" onclick="document.getElementById('bg-upload').click()">
        <div class="eff-icon">🖼️</div>画像
      </div>
    </div>
    <div class="color-picker-row" id="color-picker-row" style="display:none">
      <div class="color-swatch selected" style="background:#1a1a3e" onclick="setBgColor('#1a1a3e',this)"></div>
      <div class="color-swatch" style="background:#0f2922" onclick="setBgColor('#0f2922',this)"></div>
      <div class="color-swatch" style="background:#1a0a0a" onclick="setBgColor('#1a0a0a',this)"></div>
      <div class="color-swatch" style="background:#0a1a2e" onclick="setBgColor('#0a1a2e',this)"></div>
      <div class="color-swatch" style="background:#2a1a3e" onclick="setBgColor('#2a1a3e',this)"></div>
      <div class="color-swatch" style="background:#111111" onclick="setBgColor('#111111',this)"></div>
      <input type="color" id="custom-color" style="width:32px;height:32px;border-radius:6px;border:2px solid #3a3a5a;cursor:pointer;padding:0" onchange="setBgColor(this.value,null)">
    </div>
    <input type="file" id="bg-upload" accept="image/*" style="display:none" onchange="loadBgImage(this)">
    <div id="bg-history-row"></div>
  </div>

  <!-- カメラズーム -->
  <div class="effects-section">
    <h3>カメラズーム（画角調整）</h3>
    <div class="zoom-row">
      <span style="font-size:12px;color:#aaa">広角</span>
      <input type="range" id="zoom-slider" min="70" max="160" value="100" step="5" oninput="setZoom(this.value)">
      <span style="font-size:12px;color:#aaa">望遠</span>
      <span id="zoom-label">1.0x</span>
    </div>
  </div>

  <!-- 音声設定 -->
  <div class="effects-section">
    <h3>音声設定</h3>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <div style="font-size:12px;color:#aaa;margin-bottom:6px">マイク音量</div>
        <div class="zoom-row">
          <span style="font-size:11px;color:#666">小</span>
          <input type="range" id="volume-slider" min="0" max="300" value="100" step="5" oninput="setVolume(this.value)">
          <span style="font-size:11px;color:#666">大</span>
          <span id="volume-label" style="font-size:12px;color:#6c63ff;min-width:36px;text-align:right">100%</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;justify-content:space-between;font-size:13px;cursor:pointer">
          <span>コンプレッサー <span style="font-size:11px;color:#666">（音量を均一化）</span></span>
          <input type="checkbox" id="toggle-compressor" onchange="toggleCompressor(this.checked)" style="width:16px;height:16px;accent-color:#6c63ff;cursor:pointer">
        </label>
        <label style="display:flex;align-items:center;justify-content:space-between;font-size:13px;cursor:pointer">
          <span>ローカット <span style="font-size:11px;color:#666">（空調音を除去）</span></span>
          <input type="checkbox" id="toggle-lowcut" onchange="toggleLowcut(this.checked)" style="width:16px;height:16px;accent-color:#6c63ff;cursor:pointer">
        </label>
      </div>
    </div>
  </div>
</div>


<!-- スマホ用もっとメニュー -->
<div id="more-menu">
  <button class="ctrl-btn" id="btn-effects-m" onclick="toggleEffects();closeMore()">
    <div class="icon">✨</div><span>エフェクト</span>
  </button>
  <button class="ctrl-btn" id="btn-screen-m" onclick="toggleScreen();closeMore()">
    <div class="icon">🖥️</div><span>画面共有</span>
  </button>
  <button class="ctrl-btn" id="btn-record-m" onclick="toggleRecording();closeMore()">
    <div class="icon">⏺️</div><span>録画</span>
  </button>
</div>

<!-- 文字起こしモーダル（クライアント向け） -->
<div id="transcribe-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:center;justify-content:center">
  <div style="background:#1e1e3a;border-radius:16px;padding:28px;width:min(360px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.5)">
    <div style="font-size:16px;font-weight:600;margin-bottom:8px">📝 文字起こし機能が有効です</div>
    <div style="font-size:13px;color:#888;margin-bottom:16px">会議終了後、内容の要約をメールでお届けします。</div>
    <input id="modal-email" type="email" placeholder="メールアドレス（省略可）"
      style="width:100%;padding:12px;background:#2a2a4a;border:1px solid #3a3a5a;border-radius:8px;color:#fff;font-size:14px;margin-bottom:12px;outline:none;box-sizing:border-box">

      <button onclick="closeTranscribeModal()" style="flex:1;padding:10px;background:#2a2a4a;border:1px solid #3a3a5a;border-radius:8px;color:#ccc;font-size:14px;cursor:pointer">スキップ</button>
    </div>

<div id="notification"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const ICE_CONFIG = {
  iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }]
};

function applyOpusParams(sdp) {
  const match = sdp.match(/a=rtpmap:(\d+) opus/i);
  if (!match) return sdp;
  const pt = match[1];
  const fmtp = `a=fmtp:${pt} minptime=10;useinbandfec=1;stereo=0;maxaveragebitrate=40000`;
  if (sdp.includes(`a=fmtp:${pt} `)) {
    return sdp.replace(new RegExp(`a=fmtp:${pt} [^\r\n]*`), fmtp);
  }
  return sdp.replace(new RegExp(`(a=rtpmap:${pt} opus[^\r\n]*\r\n)`), `$1${fmtp}\r\n`);
}

let socket, rawStream, localStream, screenStream;
let myName = '', myRoomId = '';
const peers = {}, peerNames = {}, peerStreams = {}, peerInitiator = {};

// === エフェクト状態 ===
let effectsInited = false;
let mpSegmenter = null, mpReady = false, mpSending = false, mpModelLoading = false;
let mpTimestamp = 0;
let maskCanvas2 = null, maskCtx2 = null, maskBuf = null;
let dilCanvas = null, dilCtx = null;
let bgCanvas = null, bgCtx = null;
let prevMaskData = null;
let bgMode = 'none';
let bgColorVal = '#1a1a3e';
let bgImg = null, bgImgDataUrl = null;
let beautyLevel = 0;
let zoomLevel = 1.0;
let effectsCanvas, effectsCtx, effectsStream, effectsVideo;
let segCanvas, segCtx;
let personCanvas, personCtx;
let rafId = null;

// 美肌: beautyCanvas に screen blend で描画してシミ・テカりを軽減
let beautyCanvas = null, beautyCtx = null;

const urlParams = new URLSearchParams(location.search);
if (urlParams.get('room')) {
  document.getElementById('input-room').value = urlParams.get('room');
  (async () => {
    try {
      const r = await fetch('/api/room-info?room=' + encodeURIComponent(urlParams.get('room')));
      const info = await r.json();
      if (!info.found) return;
      const banner = document.getElementById('time-banner');
      const fmt = dt => new Date(dt).toLocaleString('ja-JP', { month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
      const start = fmt(info.start_time), end = new Date(info.end_time).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      if (info.is_on_time) {
        banner.className = 'time-banner on-time';
        banner.innerHTML = `<div class="tb-title">✅ 予約時間内です</div>${info.host_name} さんと ${info.booker_name} さんの面談（〜${end}）`;
      } else if (info.is_too_early) {
        banner.className = 'time-banner too-early';
        banner.innerHTML = `<div class="tb-title">⏰ 予約時間前です</div>面談の開始時刻は ${start} 〜 ${end} です。<br>お時間になりましたら再度アクセスしてください。`;
      } else {
        banner.className = 'time-banner too-late';
        banner.innerHTML = `<div class="tb-title">⚠️ 予約時間が終了しています</div>この面談（${start} 〜 ${end}）はすでに終了しています。`;
      }
      banner.style.display = 'block';
    } catch(e) {}
  })();
}
document.getElementById('input-email').value = localStorage.getItem('meetEmail') || '';

let myEmail = '', isHost = false, roomTranscribeMode = 'host_only';
let audioRecorder = null, audioSessionId = null, audioChunkIndex = 0;
const pendingUploads = new Set();

async function joinRoom() {
  const name = document.getElementById('input-name').value.trim();
  const room = document.getElementById('input-room').value.trim();
  const pass = document.getElementById('input-pass').value;
  const errEl = document.getElementById('error-msg');
  if (!name) { errEl.textContent = '名前を入力してください'; return; }
  if (!room) { errEl.textContent = 'ルームIDを入力してください'; return; }
  errEl.textContent = '';
  myEmail = document.getElementById('input-email').value.trim();
  if (myEmail) localStorage.setItem('meetEmail', myEmail);
  const transcribeMode = document.getElementById('input-allow-all').checked ? 'all' : 'host_only';
  const isMobile = window.innerWidth <= 640 || /Mobi|Android/i.test(navigator.userAgent);
  try {
    rawStream = await navigator.mediaDevices.getUserMedia({
      video: isMobile
        ? { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        : { width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
  } catch(e) {
    if (e.name === 'NotReadableError' || e.name === 'TrackStartError') {
      errEl.textContent = 'カメラまたはマイクが他のアプリで使用中です。他のアプリを閉じてから再度お試しください。';
    } else if (e.name === 'NotFoundError') {
      errEl.textContent = 'カメラまたはマイクが見つかりません。接続を確認してください。';
    } else if (e.name === 'OverconstrainedError') {
      errEl.textContent = 'カメラの設定に問題があります。ページを再読み込みしてお試しください。';
    } else {
      errEl.textContent = `エラー: ${e.name} — カメラ・マイクの許可を確認してください。`;
    }
    return;
  }
  if (isMobile) {
    const track = rawStream.getVideoTracks()[0];
    const caps = track?.getCapabilities?.();
    if (caps?.zoom) {
      try { await track.applyConstraints({ advanced: [{ zoom: caps.zoom.min }] }); } catch(e) {}
    }
  }
  localStream = rawStream;
  myName = name; myRoomId = room;
  loadBgSettings();
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('meeting').style.display = 'flex';
  document.getElementById('room-info').textContent = 'ルーム: ' + room;
  document.getElementById('top-room-name').textContent = 'ルーム: ' + room;
  startTimer();
  startSpeakerDetection();
  addVideoTile('local', myName, localStream, true);
  socket = io();
  socket.on('join-error', msg => { alert(msg); location.reload(); });
  socket.on('room-joined', ({ existingUsers, transcribeMode }) => {
    isHost = existingUsers.length === 0;
    roomTranscribeMode = transcribeMode || 'host_only';
    existingUsers.forEach(({ id, name }) => { peerNames[id] = name; createPeer(id, name, true); });
    updateCount();
    if (isHost && myEmail) startAutoAudioRecording();
    else if (!isHost && roomTranscribeMode === 'all') setTimeout(showTranscribeModal, 800);
  });
  socket.on('user-joined', ({ id, name }) => {
    peerNames[id] = name; createPeer(id, name, false);
    notify(name + ' が参加しました'); updateCount();
  });
  socket.on('offer', async ({ from, fromName, offer }) => {
    if (!peers[from]) createPeer(from, fromName || peerNames[from] || from, false);
    const pc = peers[from];
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    answer.sdp = applyOpusParams(answer.sdp);
    await pc.setLocalDescription(answer);
    socket.emit('answer', { to: from, answer });
  });
  socket.on('answer', async ({ from, answer }) => {
    const pc = peers[from];
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
  });
  socket.on('ice-candidate', async ({ from, candidate }) => {
    const pc = peers[from];
    if (pc && candidate) try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
  });
  socket.on('user-left', ({ id, name }) => {
    if (peers[id]) { peers[id].close(); delete peers[id]; }
    const tile = document.getElementById('tile-' + id);
    if (tile) tile.remove();
    const stile = document.getElementById('tile-screen-' + id);
    if (stile) stile.remove();
    delete peerNames[id]; delete peerStreams[id]; delete peerInitiator[id];
    notify((name || id) + ' が退出しました'); updateCount(); updateGrid();
  });
  socket.on('chat-message', ({ from, message, time }) => {
    if (from !== myName) addChatMessage(from, message, time, false, false);
  });
  socket.on('chat-file', ({ from, message, time }) => addChatMessage(from, message, time, from === myName, true));

  socket.on('recording-ready', ({ url, filename, uploader }) => {
    const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    const linkMsg = `🎬 録画完了<br><a href="${url}" download="${filename}" target="_blank" style="color:#4ade80;font-weight:600">⬇️ ${filename}</a>`;
    addChatMessage(uploader + 'が録画を共有', linkMsg, time, false, true);
    document.getElementById('chat-panel').classList.add('open');
    document.getElementById('btn-chat').classList.add('active');
    notify('録画の準備ができました。チャットからダウンロードできます。');
  });
  socket.on('transcription-status', ({ status }) => {
    const msgs = { transcribing: '🎙️ 文字起こし処理中...', summarizing: '🤖 AI要約生成中...', error: '❌ 文字起こしに失敗しました' };
    if (msgs[status]) notify(msgs[status]);
  });
  socket.on('transcription-ready', ({ transcriptUrl, summaryUrl, transcriptFilename, summaryFilename }) => {
    const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    const msg = `📝 文字起こし・要約が完成しました<br><a href="${transcriptUrl}" download="${transcriptFilename}" target="_blank" style="color:#60a5fa;font-weight:600">⬇️ 文字起こし (TXT)</a><br><a href="${summaryUrl}" download="${summaryFilename}" target="_blank" style="color:#f472b6;font-weight:600">⬇️ AI要約 (TXT)</a>`;
    addChatMessage('システム', msg, time, false, true);
    document.getElementById('chat-panel').classList.add('open');
    document.getElementById('btn-chat').classList.add('active');
    notify('文字起こしと要約の準備ができました！');
  });
  socket.on('screen-share-stop', ({ id }) => {
    const st = document.getElementById('tile-screen-' + id);
    if (st) { st.remove(); updateGrid(); }
    if (peerStreams[id]) {
      const mv = document.getElementById('tile-' + id);
      const s = mv && mv.querySelector('video').srcObject;
      peerStreams[id] = s ? new Set([s.id]) : new Set();
    }
  });
  socket.emit('join-room', { roomId: room, password: pass, userName: name, transcribeMode });
  history.replaceState(null, '', '?room=' + encodeURIComponent(room));
}

function createPeer(peerId, peerName, isInitiator) {
  const pc = new RTCPeerConnection(ICE_CONFIG);
  peers[peerId] = pc; peerNames[peerId] = peerName; peerInitiator[peerId] = isInitiator;
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  pc.ontrack = event => {
    const stream = event.streams[0];
    if (!stream || event.track.kind !== 'video') return;
    if (!peerStreams[peerId]) peerStreams[peerId] = new Set();
    if (peerStreams[peerId].has(stream.id)) return;
    peerStreams[peerId].add(stream.id);
    const existing = document.getElementById('tile-' + peerId);
    if (!existing) { addVideoTile(peerId, peerName, stream, false); updateGrid(); }
    else if (!document.getElementById('tile-screen-' + peerId)) {
      addVideoTile('screen-' + peerId, '🖥️ ' + peerNames[peerId], stream, false, 'screen-tile');
      const sv = document.getElementById('tile-screen-' + peerId);
      if (sv) sv.querySelector('video').muted = true;
      updateGrid();
    }
  };
  pc.onicecandidate = event => {
    if (event.candidate) socket.emit('ice-candidate', { to: peerId, candidate: event.candidate });
  };
  pc.onconnectionstatechange = () => { if (pc.connectionState === 'failed') pc.restartIce(); };
  if (isInitiator) {
    pc.onnegotiationneeded = async () => {
      try {
        const offer = await pc.createOffer();
        offer.sdp = applyOpusParams(offer.sdp);
        await pc.setLocalDescription(offer);
        socket.emit('offer', { to: peerId, offer });
      } catch(e) {}
    };
  }
  updateGrid(); return pc;
}

function addVideoTile(id, name, stream, isLocal, extraClass) {
  if (document.getElementById('tile-' + id)) return;
  const grid = document.getElementById('videos');
  const tile = document.createElement('div');
  tile.className = extraClass ? 'video-tile ' + extraClass : 'video-tile'; tile.id = 'tile-' + id;
  tile.innerHTML = '<video autoplay playsinline' + (isLocal ? ' muted' : '') + '></video>' +
    '<div class="avatar-placeholder">&#128100;</div>' +
    '<div class="name-tag">' + name + (isLocal ? ' (あなた)' : '') + '</div>' +
    '<div class="muted-icon">&#128263;</div>';
  tile.querySelector('video').srcObject = stream;
  grid.appendChild(tile); updateGrid();
}

function updateGrid() {
  if (layoutMode === 'speaker') { applyLayout(); return; } // タイル増減時にレイアウト再適用
  const n = document.querySelectorAll('#videos .video-tile').length;
  const grid = document.getElementById('videos');
  const landscape = window.innerWidth > window.innerHeight;
  if (n <= 1) {
    grid.style.gridTemplateColumns = '1fr';
  } else if (n === 2) {
    grid.style.gridTemplateColumns = landscape ? '1fr 1fr' : '1fr';
  } else if (n <= 4) {
    grid.style.gridTemplateColumns = landscape ? '1fr 1fr' : '1fr';
  } else {
    grid.style.gridTemplateColumns = landscape ? '1fr 1fr 1fr' : '1fr 1fr';
  }
}
window.addEventListener('resize', updateGrid);

function updateCount() {
  document.getElementById('participant-count').textContent = '参加者 ' + (Object.keys(peers).length + 1) + '人';
}

let micOn = true, camOn = true;

// ===== タイマー =====
let meetStartTime = null, timerInterval = null;
function startTimer() {
  meetStartTime = Date.now();
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - meetStartTime) / 1000);
    const el = document.getElementById('elapsed-time');
    if (el) el.textContent = String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
  }, 1000);
}

// ===== 全画面 =====
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.getElementById('meeting').requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('btn-fullscreen');
  if (btn) btn.textContent = document.fullscreenElement ? '⊡' : '⛶';
});

// ===== レイアウト =====
let layoutMode = 'grid';
let activeSpeakerId = null;
let speakerInterval = null;

function setLayout(mode) {
  layoutMode = mode;
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-layout-' + mode)?.classList.add('active');
  applyLayout();
}

function applyLayout() {
  const videos = document.getElementById('videos');
  const strip = document.getElementById('thumb-strip');
  if (!videos || !strip) return;

  const allTiles = [
    ...Array.from(videos.querySelectorAll('.video-tile')),
    ...Array.from(strip.querySelectorAll('.video-tile'))
  ];
  const landscape = window.innerWidth > window.innerHeight;

  if (layoutMode === 'grid') {
    allTiles.forEach(t => videos.appendChild(t));
    strip.style.display = 'none';
    const n = allTiles.length;
    if (n <= 1)      videos.style.gridTemplateColumns = '1fr';
    else if (n === 2) videos.style.gridTemplateColumns = landscape ? '1fr 1fr' : '1fr';
    else if (n <= 4) videos.style.gridTemplateColumns = landscape ? '1fr 1fr' : '1fr';
    else             videos.style.gridTemplateColumns = landscape ? '1fr 1fr 1fr' : '1fr 1fr';
    return;
  }

  // speaker モード
  if (allTiles.length <= 1) {
    allTiles.forEach(t => videos.appendChild(t));
    strip.style.display = 'none';
    videos.style.gridTemplateColumns = '1fr';
    return;
  }

  // 画面共有タイル優先、次にアクティブスピーカー、なければ最初のリモート
  let mainTile = allTiles.find(t => t.id.startsWith('tile-screen-'))
    || allTiles.find(t => activeSpeakerId && t.id === 'tile-' + activeSpeakerId)
    || allTiles.find(t => t.id !== 'tile-local')
    || allTiles[0];

  allTiles.forEach(t => {
    if (t === mainTile) videos.appendChild(t);
    else strip.appendChild(t);
  });

  videos.style.gridTemplateColumns = '1fr';
  strip.style.display = 'flex';
}

function startSpeakerDetection() {
  speakerInterval = setInterval(async () => {
    if (layoutMode !== 'speaker') return;
    if (Object.keys(peers).length === 0) return;
    let maxLevel = 0.015;
    let newSpeaker = null;
    for (const [peerId, pc] of Object.entries(peers)) {
      try {
        const stats = await pc.getStats();
        stats.forEach(r => {
          if (r.type === 'inbound-rtp' && r.kind === 'audio' && (r.audioLevel || 0) > maxLevel) {
            maxLevel = r.audioLevel; newSpeaker = peerId;
          }
        });
      } catch(e) {}
    }
    // ビジュアルインジケーター更新
    document.querySelectorAll('.video-tile').forEach(t => {
      const id = t.id.replace('tile-', '');
      t.classList.toggle('speaking-indicator', id === newSpeaker);
    });
    if (newSpeaker && newSpeaker !== activeSpeakerId && !document.querySelector('[id^="tile-screen-"]')) {
      activeSpeakerId = newSpeaker;
      applyLayout();
    }
  }, 1500);
}

function toggleMic() {
  micOn = !micOn;
  if (gainNode) {
    // Web Audio経由：gainを0にしてミュート
    gainNode.gain.value = micOn ? currentVolume : 0;
  } else {
    // 通常：トラックを無効化
    rawStream.getAudioTracks().forEach(t => t.enabled = micOn);
  }
  const btn = document.getElementById('btn-mic');
  btn.classList.toggle('active', !micOn);
  btn.querySelector('.icon').textContent = micOn ? '🎤' : '🔇';
  btn.querySelector('span').textContent = micOn ? 'マイク' : 'ミュート中';
  document.getElementById('tile-local').classList.toggle('muted', !micOn);
}

function toggleCam() {
  camOn = !camOn;
  rawStream.getVideoTracks().forEach(t => t.enabled = camOn);
  const btn = document.getElementById('btn-cam');
  btn.classList.toggle('active', !camOn);
  btn.querySelector('.icon').textContent = camOn ? '📷' : '🚫';
  btn.querySelector('span').textContent = camOn ? 'カメラ' : 'カメラOFF';
  document.getElementById('tile-local').classList.toggle('no-video', !camOn);
}

async function toggleScreen() {
  const btn = document.getElementById('btn-screen');
  if (!screenStream) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
      btn.classList.add('active'); btn.querySelector('span').textContent = '共有中';
      const track = screenStream.getVideoTracks()[0];
      for (const [peerId, pc] of Object.entries(peers)) {
        pc.addTrack(track, screenStream);
        if (!peerInitiator[peerId]) {
          try {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('offer', { to: peerId, offer });
          } catch(e) {}
        }
      }
      addVideoTile('screen', '🖥️ 画面共有', screenStream, false, 'screen-tile');
      const sv = document.getElementById('tile-screen') && document.getElementById('tile-screen').querySelector('video');
      if (sv) sv.muted = true;
      setLayout('speaker');
      track.onended = () => stopScreen();
    } catch(e) {}
  } else stopScreen();
}

async function stopScreen() {
  if (!screenStream) return;
  const prevStream = screenStream;
  const screenTrack = prevStream.getVideoTracks()[0];
  screenStream = null;
  prevStream.getTracks().forEach(t => t.stop());
  const btn = document.getElementById('btn-screen');
  btn.classList.remove('active'); btn.querySelector('span').textContent = '画面共有';
  const screenTile = document.getElementById('tile-screen');
  if (screenTile) {
    const strip = document.getElementById('thumb-strip');
    if (strip && strip.contains(screenTile)) strip.removeChild(screenTile);
    else if (screenTile.parentNode) screenTile.parentNode.removeChild(screenTile);
  }
  socket.emit('screen-share-stop', { roomId: myRoomId });
  for (const [peerId, pc] of Object.entries(peers)) {
    const sender = pc.getSenders().find(s => s.track === screenTrack);
    if (sender) {
      pc.removeTrack(sender);
      if (!peerInitiator[peerId]) {
        try {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          socket.emit('offer', { to: peerId, offer });
        } catch(e) {}
      }
    }
  }
  updateGrid();
}

function toggleEffects() {
  const panel = document.getElementById('effects-panel');
  panel.classList.toggle('open');
  document.getElementById('btn-effects').classList.toggle('active', panel.classList.contains('open'));
}

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  panel.classList.toggle('open');
  document.getElementById('btn-chat').classList.toggle('active', panel.classList.contains('open'));
  document.getElementById('btn-chat').querySelector('.icon').style.boxShadow = '';
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !socket) return;
  const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  addChatMessage(myName, msg, time, true, false);
  socket.emit('chat-message', { message: msg });
  input.value = '';
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('btn-chat').classList.add('active');
  document.getElementById('btn-chat').querySelector('.icon').style.boxShadow = '';
}

async function sendFile(input) {
  const file = input.files[0];
  if (!file || !socket) { input.value = ''; return; }
  input.value = '';
  const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('btn-chat').classList.add('active');
  const el = document.getElementById('chat-messages');
  const ind = document.createElement('div');
  ind.className = 'chat-msg self';
  ind.innerHTML = '<div class="sender">' + myName + '</div><span style="color:#888;font-size:12px">📤 ' + file.name + ' 送信中...</span>';
  el.appendChild(ind); el.scrollTop = el.scrollHeight;
  try {
    const form = new FormData();
    form.append('file', file, file.name);
    form.append('roomId', myRoomId);
    form.append('senderName', myName);
    const resp = await fetch('/api/upload-file', { method: 'POST', body: form });
    const data = await resp.json();
    ind.remove();
    const msgHtml = data.isImage
      ? '<a href="' + data.url + '" target="_blank"><img src="' + data.url + '" class="chat-img"></a>'
      : '<a href="' + data.url + '" download="' + data.origName + '" target="_blank" class="chat-file-link">📎 ' + data.origName + '</a>';
    addChatMessage(myName, msgHtml, time, true, true);
  } catch(e) {
    ind.innerHTML = '<div class="sender">' + myName + '</div><span style="color:#ff6b6b;font-size:12px">送信失敗</span>';
    setTimeout(() => ind.remove(), 3000);
  }
}

function addChatMessage(from, message, time, isSelf, isHtml) {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg' + (isSelf ? ' self' : '');
  const safe = isHtml ? message : message.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  div.innerHTML = '<div class="sender">' + from + '</div>' + safe + '<span class="time">' + time + '</span>';
  el.appendChild(div); el.scrollTop = el.scrollHeight;
  if (!document.getElementById('chat-panel').classList.contains('open')) {
    document.getElementById('btn-chat').querySelector('.icon').style.boxShadow = '0 0 0 3px #6c63ff';
  }
}

async function leaveRoom() {
  if (timerInterval) clearInterval(timerInterval);
  if (speakerInterval) clearInterval(speakerInterval);
  await stopAndFinalizeAudio();
  if (rawStream) rawStream.getTracks().forEach(t => t.stop());
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  if (effectsStream) effectsStream.getTracks().forEach(t => t.stop());
  if (rafId) cancelAnimationFrame(rafId);
  if (mpSegmenter) { mpSegmenter.close(); mpSegmenter = null; }
  if (socket) socket.disconnect();
  location.href = '/';
}

// ============ 音声自動録音・文字起こし ============
function startAutoAudioRecording() {
  if (!rawStream || audioRecorder) return;
  audioSessionId = Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  audioChunkIndex = 0;
  const audioStream = new MediaStream(rawStream.getAudioTracks());
  const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'].find(m => MediaRecorder.isTypeSupported(m)) || '';
  audioRecorder = new MediaRecorder(audioStream, mimeType ? { mimeType } : {});
  audioRecorder.ondataavailable = (e) => {
    if (e.data.size < 500) return;
    const idx = audioChunkIndex++;
    const form = new FormData();
    form.append('chunk', e.data, `chunk-${idx}.webm`);
    form.append('sessionId', audioSessionId);
    form.append('chunkIndex', String(idx));
    const p = fetch('/api/audio-chunk', { method: 'POST', body: form }).catch(() => {});
    pendingUploads.add(p);
    p.finally(() => pendingUploads.delete(p));
  };
  audioRecorder.start(2 * 60 * 1000);
}

async function stopAndFinalizeAudio() {
  if (!audioRecorder || audioRecorder.state === 'inactive' || !myEmail) return;
  if (audioRecorder.state === 'recording') {
    await new Promise(resolve => { audioRecorder.onstop = resolve; audioRecorder.stop(); });
  }
  await Promise.race([Promise.all([...pendingUploads]), new Promise(r => setTimeout(r, 5000))]);
  const form = new FormData();
  form.append('sessionId', audioSessionId);
  form.append('totalChunks', String(audioChunkIndex));
  form.append('email', myEmail);
  form.append('roomId', myRoomId);
  fetch('/api/audio-finalize', { method: 'POST', body: form }).catch(() => {});
}

let facingMode = 'user';
async function flipCamera() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  try {
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    const newTrack = newStream.getVideoTracks()[0];
    const caps = newTrack?.getCapabilities?.();
    if (caps?.zoom) {
      try { await newTrack.applyConstraints({ advanced: [{ zoom: caps.zoom.min }] }); } catch(e) {}
    }
    rawStream.getVideoTracks().forEach(t => { t.stop(); rawStream.removeTrack(t); });
    rawStream.addTrack(newTrack);
    if (effectsInited && effectsVideo) {
      effectsVideo.srcObject = rawStream;
    } else {
      document.getElementById('tile-local').querySelector('video').srcObject = rawStream;
    }
    Object.values(peers).forEach(pc =>
      pc.getSenders().forEach(s => { if (s.track?.kind === 'video') s.replaceTrack(newTrack); })
    );
    document.getElementById('btn-flip').querySelector('.icon').textContent = facingMode === 'user' ? '🔄' : '📸';
  } catch(e) { notify('カメラ切り替えに失敗しました'); facingMode = facingMode === 'user' ? 'environment' : 'user'; }
}

// ============ 録画 ============
let mediaRecorder = null, recordedChunks = [], recordingRaf = null, recordingCanvas = null;

async function toggleRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    cancelAnimationFrame(recordingRaf); recordingRaf = null;
    const btn = document.getElementById('btn-record');
    btn.classList.remove('active');
    btn.querySelector('.icon').textContent = '⏺️';
    btn.querySelector('span').textContent = '録画';
    notify('録画停止 — ダウンロードを確認してください');
    return;
  }

  recordedChunks = [];
  const grid = document.getElementById('videos');
  const rect = grid.getBoundingClientRect();

  recordingCanvas = document.createElement('canvas');
  recordingCanvas.width  = Math.round(rect.width);
  recordingCanvas.height = Math.round(rect.height);
  const ctx = recordingCanvas.getContext('2d');

  function drawFrame() {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, recordingCanvas.width, recordingCanvas.height);
    document.querySelectorAll('.video-tile').forEach(tile => {
      const tr = tile.getBoundingClientRect();
      const video = tile.querySelector('video');
      if (video && video.readyState >= 2) {
        ctx.drawImage(video, tr.left - rect.left, tr.top - rect.top, tr.width, tr.height);
      }
    });
    recordingRaf = requestAnimationFrame(drawFrame);
  }
  drawFrame();

  const videoStream = recordingCanvas.captureStream(30);

  // 全参加者の音声をミックス
  const recAudioCtx = new AudioContext();
  const recDest = recAudioCtx.createMediaStreamDestination();
  recAudioCtx.createMediaStreamSource(rawStream).connect(recDest);
  Object.values(peers).forEach(pc =>
    pc.getReceivers().forEach(r => {
      if (r.track?.kind === 'audio') {
        recAudioCtx.createMediaStreamSource(new MediaStream([r.track])).connect(recDest);
      }
    })
  );

  const combined = new MediaStream([
    ...videoStream.getVideoTracks(),
    ...recDest.stream.getAudioTracks()
  ]);

  const mimeType = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
    .find(m => MediaRecorder.isTypeSupported(m)) || '';

  mediaRecorder = new MediaRecorder(combined, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const filename = 'meeting-' + new Date().toISOString().slice(0,19).replace(/[T:]/g,'-') + '.webm';

    // まず自分にダウンロード
    const localUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = localUrl; a.download = filename; a.click();

    // サーバーにアップロードして全員に共有
    notify('サーバーにアップロード中...');
    try {
      const form = new FormData();
      form.append('file', blob, filename);
      form.append('roomId', myRoomId);
      form.append('uploaderName', myName);
      await fetch('/api/upload-recording', { method: 'POST', body: form });
    } catch(e) { notify('アップロードに失敗しました'); }
  };
  mediaRecorder.start(1000);

  const btn = document.getElementById('btn-record');
  btn.classList.add('active');
  btn.querySelector('.icon').textContent = '⏹️';
  btn.querySelector('span').textContent = '録画中';
  notify('録画を開始しました');
}

// ============ 音声処理 ============
let audioCtx = null, audioSource = null, gainNode = null;
let compressorNode = null, lowcutNode = null, audioDestNode = null;
let compressorEnabled = false, lowcutEnabled = false;
let currentVolume = 1.0;

async function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  audioSource   = audioCtx.createMediaStreamSource(rawStream);
  lowcutNode    = audioCtx.createBiquadFilter();
  lowcutNode.type = 'highpass';
  lowcutNode.frequency.value = 80;
  compressorNode = audioCtx.createDynamicsCompressor();
  compressorNode.threshold.value = -18;
  compressorNode.knee.value = 10;
  compressorNode.ratio.value = 4;
  compressorNode.attack.value = 0.02;
  compressorNode.release.value = 0.15;
  gainNode      = audioCtx.createGain();
  gainNode.gain.value = currentVolume;
  audioDestNode = audioCtx.createMediaStreamDestination();

  rebuildAudioChain();

  // 既存のピア接続の音声トラックを差し替え
  const track = audioDestNode.stream.getAudioTracks()[0];
  if (track) {
    Object.values(peers).forEach(pc =>
      pc.getSenders().forEach(s => { if (s.track?.kind === 'audio') s.replaceTrack(track); })
    );
  }
}

function rebuildAudioChain() {
  try { audioSource.disconnect(); } catch(e) {}
  try { lowcutNode.disconnect(); } catch(e) {}
  try { compressorNode.disconnect(); } catch(e) {}
  try { gainNode.disconnect(); } catch(e) {}

  let node = audioSource;
  if (lowcutEnabled)    { node.connect(lowcutNode);     node = lowcutNode; }
  if (compressorEnabled){ node.connect(compressorNode); node = compressorNode; }
  node.connect(gainNode);
  gainNode.connect(audioDestNode);
}

function setVolume(val) {
  currentVolume = val / 100;
  document.getElementById('volume-label').textContent = val + '%';
  if (gainNode) gainNode.gain.value = micOn ? currentVolume : 0;
}

async function toggleCompressor(on) {
  compressorEnabled = on;
  if (!audioCtx) await initAudio(); else rebuildAudioChain();
}

async function toggleLowcut(on) {
  lowcutEnabled = on;
  if (!audioCtx) await initAudio(); else rebuildAudioChain();
}

// ============ エフェクト処理 ============

async function initEffectsStream() {
  if (effectsInited) return;
  effectsInited = true;

  effectsCanvas = document.createElement('canvas');
  effectsCtx = effectsCanvas.getContext('2d');
  beautyCanvas = document.createElement('canvas');
  beautyCtx = beautyCanvas.getContext('2d');

  effectsVideo = document.createElement('video');
  effectsVideo.autoplay = true; effectsVideo.playsInline = true; effectsVideo.muted = true;
  effectsVideo.srcObject = rawStream;
  if (effectsVideo.readyState < 1) {
    await new Promise(r => { effectsVideo.onloadedmetadata = r; });
  }
  effectsVideo.play();

  effectsCanvas.width  = effectsVideo.videoWidth  || 640;
  effectsCanvas.height = effectsVideo.videoHeight || 480;
  beautyCanvas.width   = effectsCanvas.width;
  beautyCanvas.height  = effectsCanvas.height;

  // セグメンテーション用キャンバス（推論高速化のため解像度を抑える）
  segCanvas = document.createElement('canvas');
  segCanvas.width = Math.min(effectsCanvas.width, 640);
  segCanvas.height = Math.min(effectsCanvas.height, 360);
  segCtx = segCanvas.getContext('2d');

  // RVM合成用: 人物切り抜きキャンバス
  personCanvas = document.createElement('canvas');
  personCanvas.width = effectsCanvas.width;
  personCanvas.height = effectsCanvas.height;
  personCtx = personCanvas.getContext('2d');

  effectsStream = effectsCanvas.captureStream(30);
  rawStream.getAudioTracks().forEach(t => effectsStream.addTrack(t));

  localStream = effectsStream;
  document.getElementById('tile-local').querySelector('video').srcObject = effectsStream;
  replaceTracksInPeers();

  startEffectsLoop();
}

function startEffectsLoop() {
  const loop = () => {
    renderFrame();            // 同期描画（await しない）
    rafId = requestAnimationFrame(loop);
  };
  rafId = requestAnimationFrame(loop);
}

function getZoomRect() {
  const w = effectsCanvas.width, h = effectsCanvas.height;
  if (zoomLevel >= 1) {
    if (zoomLevel === 1) return { sx: 0, sy: 0, sw: w, sh: h };
    const sw = Math.round(w / zoomLevel);
    const sh = Math.round(h / zoomLevel);
    const sx = Math.round((w - sw) / 2);
    const sy = Math.round((h - sh) / 3);
    return { sx, sy, sw, sh };
  }
  // zoom < 1: wide angle — return full frame (hardware zoom handles actual FOV)
  return { sx: 0, sy: 0, sw: w, sh: h };
}

function renderFrame() {
  if (!effectsVideo || effectsVideo.readyState < 2) return;
  const w = effectsCanvas.width, h = effectsCanvas.height;
  const { sx, sy, sw, sh } = getZoomRect();

  segCtx.clearRect(0, 0, segCanvas.width, segCanvas.height);
  segCtx.drawImage(effectsVideo, sx, sy, sw, sh, 0, 0, segCanvas.width, segCanvas.height);

  // 推論を先に実行→同フレームのマスクで描画（1フレーム分の遅延を解消）
  if (bgMode !== 'none' && mpSegmenter && mpReady && !mpSending) {
    runInference();
  }

  if (bgMode !== 'none' && maskCanvas2) {
    drawWithMask(w, h);
  } else {
    effectsCtx.clearRect(0, 0, w, h);
    effectsCtx.filter = 'none';
    effectsCtx.drawImage(effectsVideo, sx, sy, sw, sh, 0, 0, w, h);
    applyBeautyOverlay(effectsCtx, effectsVideo, sx, sy, sw, sh, 0, 0, w, h);
  }
}

function runInference() {
  if (!mpSegmenter || mpSending) return;
  mpSending = true;
  mpTimestamp = performance.now();
  try {
    mpSegmenter.segmentForVideo(segCanvas, mpTimestamp, onMpResults);
  } catch(e) {
    console.warn('MP segmentForVideo error:', e);
    mpSending = false;
  }
}

function onMpResults(result) {
  // selfie_multiclass: 0=bg, 1=hair, 2=body-skin, 3=face-skin, 4=clothes, 5=others
  const masks = result.confidenceMasks;
  if (!masks || masks.length < 2) { result.close?.(); mpSending = false; return; }

  const w = masks[0].width;
  const h = masks[0].height;

  if (!maskCanvas2 || maskCanvas2.width !== w || maskCanvas2.height !== h) {
    maskCanvas2 = document.createElement('canvas');
    maskCanvas2.width = w; maskCanvas2.height = h;
    maskCtx2 = maskCanvas2.getContext('2d');
    maskBuf = new Uint8ClampedArray(w * h * 4);
    prevMaskData = null;
  }
  if (!prevMaskData || prevMaskData.length !== w * h) {
    prevMaskData = new Float32Array(w * h);
  }

  // クラス1-4（髪・肌・服）を合算。5=othersは椅子等の誤検出を含むため除外
  const d1 = masks[1].getAsFloat32Array(); // hair
  const d2 = masks[2].getAsFloat32Array(); // body-skin
  const d3 = masks[3].getAsFloat32Array(); // face-skin
  const d4 = masks.length > 4 ? masks[4].getAsFloat32Array() : null; // clothes

  for (let i = 0, j = 0; i < w * h; i++, j += 4) {
    const person = Math.min(1.0, d1[i] + d2[i] + d3[i] + (d4 ? d4[i] : 0));
    const t = Math.max(0, Math.min(1, (person - 0.10) / 0.50));
    const stepped = t * t * (3 - 2 * t);
    const alpha = stepped > prevMaskData[i] ? 0.05 : 0.55;
    prevMaskData[i] = alpha * prevMaskData[i] + (1 - alpha) * stepped;
    // 二値化しない: グラデーション値そのまま出力（blur+contrastが中間値を拡張できる）
    const out = Math.round(prevMaskData[i] * 255);
    maskBuf[j] = maskBuf[j+1] = maskBuf[j+2] = maskBuf[j+3] = out;
  }

  maskCtx2.putImageData(new ImageData(maskBuf, w, h), 0, 0);
  result.close();
  mpSending = false;
}

function drawWithMask(w, h) {
  const { sx, sy, sw, sh } = getZoomRect();

  // Step1: オリジナル映像（人物含む）をベースに描く
  effectsCtx.clearRect(0, 0, w, h);
  if (beautyLevel > 0) {
    applyBeautyToCanvas(effectsVideo, w, h, sx, sy, sw, sh);
    effectsCtx.drawImage(beautyCanvas, 0, 0, w, h);
  } else {
    effectsCtx.drawImage(effectsVideo, sx, sy, sw, sh, 0, 0, w, h);
  }

  // Step2: bgCanvasに背景（ぼかし/色/画像）を描く
  if (!bgCanvas || bgCanvas.width !== w || bgCanvas.height !== h) {
    bgCanvas = document.createElement('canvas');
    bgCanvas.width = w; bgCanvas.height = h;
    bgCtx = bgCanvas.getContext('2d');
  }
  bgCtx.clearRect(0, 0, w, h);
  if (bgMode === 'blur') {
    bgCtx.filter = 'blur(24px) brightness(0.7)';
    bgCtx.drawImage(effectsVideo, sx, sy, sw, sh, 0, 0, w, h);
    bgCtx.filter = 'none';
  } else if (bgMode === 'color') {
    bgCtx.fillStyle = bgColorVal;
    bgCtx.fillRect(0, 0, w, h);
  } else if (bgMode === 'image' && bgImg) {
    bgCtx.save();
    bgCtx.scale(-1, 1);
    bgCtx.drawImage(bgImg, -w, 0, w, h);
    bgCtx.restore();
  }

  // Step3: maskCanvas2を直接destination-outに使う（EMAグラデーションが自然な境界）
  // 中間canvas不要・拡張なし = over-cutによる元背景露出ゼロ
  bgCtx.globalCompositeOperation = 'destination-out';
  bgCtx.drawImage(maskCanvas2, 0, 0, w, h);
  bgCtx.globalCompositeOperation = 'source-over';

  // Step5: オリジナル映像の上にくり抜き済み背景を重ねる
  // 人物部分は透明なのでオリジナルがそのまま透けて見える→隙間ゼロ
  effectsCtx.drawImage(bgCanvas, 0, 0);
}

async function loadSegModel() {
  if (mpSegmenter || mpModelLoading) return;
  mpModelLoading = true;
  document.getElementById('loading-model').style.display = 'block';

    );
    const { ImageSegmenter, FilesetResolver } = visionModule;
    const filesetResolver = await FilesetResolver.forVisionTasks(

    );
    // selfie_multiclass: 髪・顔・肌・服を個別に分類→高精度マスク
    mpSegmenter = await ImageSegmenter.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/latest/selfie_multiclass_256x256.tflite',
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      outputCategoryMask: false,
      outputConfidenceMasks: true
    });

// --- 美肌フィルター（screen blend でシミ・テカり軽減） ---
// src から beautyCanvas に美肌済み画像を書き込む（sx/sy/sw/sh でズーム対応）
function applyBeautyToCanvas(src, w, h, sx=0, sy=0, sw=null, sh=null) {
  if (sw == null) sw = src.videoWidth || src.width || w;
  if (sh == null) sh = src.videoHeight || src.height || h;
  const strong = beautyLevel === 2;
  const blurR  = strong ? 3 : 2;
  const detail = strong ? 0.42 : 0.52;

  if (beautyCanvas.width !== w || beautyCanvas.height !== h) {
    beautyCanvas.width = w; beautyCanvas.height = h;
  }
  beautyCtx.clearRect(0, 0, w, h);
  beautyCtx.globalCompositeOperation = 'source-over';
  beautyCtx.globalAlpha = 1.0;

  beautyCtx.filter = `blur(${blurR}px)`;
  beautyCtx.drawImage(src, sx, sy, sw, sh, 0, 0, w, h);
  beautyCtx.filter = 'none';

  beautyCtx.globalCompositeOperation = 'lighten';
  beautyCtx.drawImage(src, sx, sy, sw, sh, 0, 0, w, h);

  beautyCtx.globalCompositeOperation = 'source-over';
  beautyCtx.globalAlpha = detail;
  beautyCtx.drawImage(src, sx, sy, sw, sh, 0, 0, w, h);
  beautyCtx.globalAlpha = 1.0;
}

// bgMode=none のとき effectsCtx に直接美肌オーバーレイを追加
function applyBeautyOverlay(ctx, src, sx, sy, sw, sh, dx, dy, dw, dh) {
  if (beautyLevel === 0) return;
  const strong = beautyLevel === 2;
  const blurR  = strong ? 3 : 2;
  const detail = strong ? 0.42 : 0.52;

  // ぼかしベースを source-over で重ねる（現フレームの上に）
  ctx.globalCompositeOperation = 'source-over';
  ctx.filter = `blur(${blurR}px)`;
  ctx.globalAlpha = 1.0;
  ctx.drawImage(src, sx, sy, sw, sh, dx, dy, dw, dh);
  ctx.filter = 'none';

  // lighten で元画像重ね（シミを飛ばす）
  ctx.globalCompositeOperation = 'lighten';
  ctx.drawImage(src, sx, sy, sw, sh, dx, dy, dw, dh);

  // 細部復元
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = detail;
  ctx.drawImage(src, sx, sy, sw, sh, dx, dy, dw, dh);
  ctx.globalAlpha = 1.0;
}

function replaceTracksInPeers() {
  const vTrack = localStream.getVideoTracks()[0];
  const aTrack = localStream.getAudioTracks()[0];
  Object.values(peers).forEach(pc => {
    pc.getSenders().forEach(s => {
      if (s.track?.kind === 'video' && vTrack) s.replaceTrack(vTrack);
      if (s.track?.kind === 'audio' && aTrack) s.replaceTrack(aTrack);
    });
  });
}

// ---- 外見補正 ----
async function setBeauty(level) {
  beautyLevel = level;
  ['off','light','strong'].forEach((n,i) => {
    document.getElementById('beauty-' + n).classList.toggle('selected', i === level);
  });
  if (level > 0) await initEffectsStream();
  else if (bgMode === 'none' && effectsInited) {
    cancelAnimationFrame(rafId); rafId = null;
    effectsInited = false;
    prevMaskData = null;
    localStream = rawStream;
    document.getElementById('tile-local').querySelector('video').srcObject = rawStream;
    replaceTracksInPeers();
  }
}

// ---- 仮想背景 ----
async function setBg(mode) {
  bgMode = mode;
  ['none','blur','color','image'].forEach(m => {
    document.getElementById('bg-' + m)?.classList.toggle('selected', m === mode);
  });
  document.getElementById('color-picker-row').style.display = mode === 'color' ? 'flex' : 'none';

  if (mode === 'none') {
    if (beautyLevel === 0 && effectsInited) {
      cancelAnimationFrame(rafId); rafId = null;
      effectsInited = false;
      localStream = rawStream;
      document.getElementById('tile-local').querySelector('video').srcObject = rawStream;
      replaceTracksInPeers();
    }
    return;
  }
  await loadSegModel();
  await initEffectsStream();
  saveBgSettings();
}

function setBgColor(color, el) {
  bgColorVal = color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  if (el) el.classList.add('selected');
  if (bgMode !== 'color') setBg('color');
  else saveBgSettings();
}

async function setZoom(val) {
  zoomLevel = val / 100;
  document.getElementById('zoom-label').textContent = zoomLevel.toFixed(2).replace(/\.?0+$/, '') + 'x';

  // 広角側: カメラのハードウェアズームを試みる
  if (zoomLevel < 1 && rawStream) {
    const track = rawStream.getVideoTracks()[0];
    const caps = track?.getCapabilities?.();
    if (caps?.zoom) {
      const { min: zMin, max: zMax } = caps.zoom;
      // 0.70 → zMin（最広角）、1.0 → zMin（デフォルト広角）
      const hwZoom = zMin + (zoomLevel - 0.70) / 0.30 * (zMax * 0.2 - zMin);
      try {
        await track.applyConstraints({ advanced: [{ zoom: Math.max(zMin, Math.min(zMax, hwZoom)) }] });
      } catch(e) { /* ハードウェアズーム非対応 */ }
    }
  }
  if (zoomLevel >= 1 && rawStream) {
    const track = rawStream.getVideoTracks()[0];
    const caps = track?.getCapabilities?.();
    if (caps?.zoom) {
      const { min: zMin, max: zMax } = caps.zoom;
      try { await track.applyConstraints({ advanced: [{ zoom: zMin }] }); } catch(e) {}
    }
  }
  if (zoomLevel > 1) await initEffectsStream();
}

function compressImageDataUrl(dataUrl, maxW, maxH, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
      const w = Math.round(img.width * ratio);
      const h = Math.round(img.height * ratio);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

function getBgHistory() {
  const bgKey = myEmail || myName;
  if (!bgKey) return [];
  try { return JSON.parse(localStorage.getItem('meet_bg_hist_' + bgKey) || '[]'); } catch(e) { return []; }
}

function safeLsSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch(e) {
    // QuotaExceeded: 古い meet_bg_* データを全削除してリトライ
    for (const k of [...Object.keys(localStorage)].filter(k => k.startsWith('meet_bg_'))) {
      localStorage.removeItem(k);
    }
    try { localStorage.setItem(key, value); } catch(e2) {
      console.warn('bg save failed even after cleanup:', e2);
    }
  }
}

function addToBgHistory(dataUrl) {
  const bgKey = myEmail || myName;
  if (!bgKey) { console.warn('addToBgHistory: no bgKey'); return; }
  let hist = getBgHistory().filter(u => u !== dataUrl);
  hist.unshift(dataUrl);
  hist = hist.slice(0, 6);
  safeLsSet('meet_bg_hist_' + bgKey, JSON.stringify(hist));
}

function renderBgHistory() {
  const row = document.getElementById('bg-history-row');
  if (!row) return;
  const hist = getBgHistory();
  row.innerHTML = '';
  hist.forEach(dataUrl => {
    const d = document.createElement('div');
    d.className = 'bg-thumb' + (bgImgDataUrl === dataUrl ? ' selected' : '');
    d.style.backgroundImage = 'url(' + dataUrl + ')';
    d.title = '背景画像を適用';
    d.onclick = () => applyBgFromHistory(dataUrl);
    row.appendChild(d);
  });
}

async function applyBgFromHistory(dataUrl) {
  const img = new Image();
  img.onload = async () => {
    bgImg = img;
    bgImgDataUrl = dataUrl;
    ['none','blur','color'].forEach(m => document.getElementById('bg-' + m)?.classList.remove('selected'));
    bgMode = 'image';
    document.getElementById('color-picker-row').style.display = 'none';
    renderBgHistory();
    await loadSegModel();
    await initEffectsStream();
    saveBgSettings();
  };
  img.src = dataUrl;
}

function loadBgImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const compressed = await compressImageDataUrl(e.target.result, 640, 360, 0.78);
    addToBgHistory(compressed);
    await applyBgFromHistory(compressed);
    notify('背景画像を設定しました');
  };
  reader.readAsDataURL(file);
}

function saveBgSettings() {
  const bgKey = myEmail || myName;
  if (!bgKey) { console.warn('saveBgSettings: no bgKey'); return; }
  const settings = { mode: bgMode, color: bgColorVal };
  if (bgMode === 'image' && bgImgDataUrl) settings.imgDataUrl = bgImgDataUrl;
  safeLsSet('meet_bg_' + bgKey, JSON.stringify(settings));
}

function loadBgSettings() {
  renderBgHistory();
  const bgKey = myEmail || myName;
  if (!bgKey) return;
  const raw = localStorage.getItem('meet_bg_' + bgKey);
  if (!raw) return;
  try {
    const s = JSON.parse(raw);
    if (s.color) {
      bgColorVal = s.color;
      const picker = document.getElementById('bg-color-input');
      if (picker) picker.value = s.color;
    }
    if (s.mode === 'blur') setBg('blur');
    else if (s.mode === 'color') setBg('color');
    else if (s.mode === 'image' && s.imgDataUrl) {
      const img = new Image();
      img.onload = async () => {
        bgImg = img;
        bgImgDataUrl = s.imgDataUrl;
        bgMode = 'image';
        document.getElementById('bg-image')?.classList.add('selected');
        ['none','blur','color'].forEach(m => document.getElementById('bg-' + m)?.classList.remove('selected'));
        renderBgHistory();
        await loadSegModel();
        await initEffectsStream();
      };
      img.src = s.imgDataUrl;
    }
  } catch(e) {}
}
